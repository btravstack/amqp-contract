autoInstallPeers: false

dedupePeerDependents: true

engineStrict: true

saveExact: true

strictPeerDependencies: true

peerDependencyRules:
  ignoreMissing:
    - search-insights

packages:
  - packages/*
  - examples/*
  - tools/*
  - tests
  - docs

catalog:
  "@asyncapi/parser": 3.6.0
  "@btravstack/theme": 1.3.0
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.1.0
  "@commitlint/config-conventional": 21.1.0
  "@opentelemetry/api": 1.9.1
  "@orpc/arktype": 1.14.6
  "@orpc/openapi": 1.14.6
  "@orpc/valibot": 1.14.6
  "@orpc/zod": 1.14.6
  "@standard-schema/spec": 1.1.0
  "@types/node": 24.13.2
  "@unthrown/vitest": 3.0.0
  "@vitest/coverage-v8": 4.1.9
  amqp-connection-manager: 5.0.0
  amqplib: 2.0.1
  arktype: 2.2.1
  knip: 6.20.0
  lefthook: 2.1.9
  mermaid: 11.16.0
  oxfmt: 0.56.0
  oxlint: 1.71.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  testcontainers: 12.0.3
  ts-pattern: 5.9.0
  tsdown: 0.22.3
  tsx: 4.22.4
  turbo: 2.10.0
  typedoc: 0.28.19
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  unthrown: 3.0.0
  valibot: 1.4.1
  vitepress: 1.6.4
  vitepress-plugin-mermaid: 2.0.17
  vitest: 4.1.9
  yaml: 2.9.0
  zod: 4.4.3

minimumReleaseAge: 10080 # 7 days, in minutes
minimumReleaseAgeStrict: true

# unthrown and its companions are first-party (btravstack) packages; exempt them
# from the release-age maturity gate so freshly published versions can be adopted
# immediately.
minimumReleaseAgeExclude:
  - "@btravstack/theme"
  - unthrown
  - "@unthrown/vitest"

overrides:
  tsx>esbuild: ^0.28.1
  vite@>=6>esbuild: ^0.28.1
  # Force patched undici (testcontainers pulls in <8.5.0, vulnerable to WebSocket DoS)
  undici: ^8.5.0
  # Keep @types/node on the supported Node major (24.x) everywhere — dev tooling
  # (@changesets/cli, @commitlint/cli) would otherwise pull @types/node@26
  # transitively. Types-only, so this has no runtime effect. `catalog:` keeps it
  # in sync with the catalog entry above (single source of truth).
  "@types/node": "catalog:"

auditConfig:
  ignoreGhsas:
    - GHSA-fx2h-pf6j-xcff
    - GHSA-v6wh-96g9-6wx3
    - GHSA-4w7w-66w2-5vf9
    - GHSA-gv7w-rqvm-qjhr
    - GHSA-g7r4-m6w7-qqqr
    - GHSA-67mh-4wv8-2f99

allowBuilds:
  cpu-features: true
  esbuild: true
  lefthook: true
  protobufjs: true
  ssh2: true
