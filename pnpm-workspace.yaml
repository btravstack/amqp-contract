autoInstallPeers: false
dedupePeerDependents: true
engineStrict: true
saveExact: true
strictPeerDependencies: true

packages:
  - packages/*
  - examples/*
  - tools/*
  - tests
  - docs

catalog:
  "@arethetypeswrong/cli": 0.18.5
  "@asyncapi/parser": 3.6.0
  "@btravstack/commitlint": 0.1.0
  "@btravstack/oxlint": 0.1.0
  "@btravstack/theme": 1.7.0
  "@btravstack/tsconfig": 0.1.0
  "@btravstack/typedoc": 0.1.0
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.2.1
  "@opentelemetry/api": 1.9.1
  "@orpc/arktype": 1.14.8
  "@orpc/openapi": 1.14.8
  "@orpc/valibot": 1.14.8
  "@orpc/zod": 1.14.8
  "@standard-schema/spec": 1.1.0
  "@types/node": 26.1.1
  "@unthrown/vitest": 4.1.0
  "@vitest/coverage-v8": 4.1.10
  amqp-connection-manager: 5.0.0
  amqplib: 2.0.1
  arktype: 2.2.3
  knip: 6.26.0
  lefthook: 2.1.10
  mermaid: 11.16.0
  oxfmt: 0.58.0
  oxlint: 1.73.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  publint: 0.3.21
  testcontainers: 12.0.4
  ts-pattern: 5.9.0
  tsdown: 0.22.7
  tsx: 4.23.1
  turbo: 2.10.5
  typedoc: 0.28.20
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  unthrown: 4.1.0
  valibot: 1.4.2
  vitepress: 1.6.4
  vitepress-plugin-mermaid: 2.0.17
  vitest: 4.1.10
  yaml: 2.9.0
  zod: 4.4.3

peerDependencyRules:
  ignoreMissing:
    # Optional analytics peer of VitePress's bundled Algolia DocSearch.
    - search-insights

# Force patched versions of vulnerable transitive dependencies. The `@major`
# selectors pull each affected version line up to its first fixed release
# without disturbing unrelated lines. All of these reach us only through
# dev/build/test tooling.
overrides:
  # GHSA-v2hh-gcrm-f6hx (High): fast-uri host confusion via literal backslash
  # authority delimiter. Only the vulnerable <3.1.4 line is present (transitive,
  # via ajv under commitlint/prisma tooling); 3.1.4 is the first patched release.
  # Newly disclosed; reaches us only through dev/build tooling. fast-uri is added
  # to minimumReleaseAgeExclude below because 3.1.4 is younger than the 7-day cutoff.
  "fast-uri@<3.1.4": "3.1.4"
  # GHSA-3jxr-9vmj-r5cp (High): brace-expansion ReDoS. Three distinct lines are
  # present: 1.x via @asyncapi/parser > spectral, 2.x via testcontainers >
  # archiver, and 5.x via typedoc > minimatch. Each is pulled to its patched
  # release.
  "brace-expansion@1": "1.1.16"
  "brace-expansion@2": "2.1.2"
  "brace-expansion@5": "5.0.7"
  # GHSA-52cp-r559-cp3m (High) + GHSA-h67p-54hq-rp68 (moderate): js-yaml
  # quadratic-CPU / merge-key issues. The legacy 3.x line arrives via
  # @changesets/cli > read-yaml-file; the 4.x line via @changesets/cli >
  # @changesets/parse and @asyncapi/parser. Both pulled to their patched release.
  "js-yaml@3": "3.15.0"
  "js-yaml@4": "4.3.0"
  # GHSA-fx2h-pf6j-xcff (High) + GHSA-v6wh-96g9-6wx3 / GHSA-4w7w-66w2-5vf9 /
  # GHSA-67mh-4wv8-2f99 (moderate): vite `server.fs.deny` bypass + esbuild
  # dev-server CORS (dev-server only; the docs ship as static HTML). Reaches us
  # via docs > vitepress > vite. vitepress 1.6.x pins vite ^5.4.14 with no
  # patched 5.x, so lift any pre-6.4.3 vite to 6.4.3 (first fixed release) — this
  # also drags esbuild up to a patched 0.25.x. The `vitepress build` is verified
  # against it.
  "vite@<6.4.3": "6.4.3"
  # GHSA-cmwh-pvxp-8882 (moderate) + GHSA-vxr8-fq34-vvx9 (low): dompurify XSS /
  # mXSS, via docs > mermaid > dompurify. 3.4.11 is the first fixed release.
  dompurify: 3.4.11
  # GHSA-j3f2-48v5-ccww (moderate): protobufjs prototype pollution, via
  # packages/testing > testcontainers > dockerode > @grpc/proto-loader. 7.6.5 is
  # the first fixed release.
  protobufjs: 7.6.5
  # Keep @types/node pinned to the catalog major (26.x) everywhere — dev tooling
  # would otherwise pull other @types/node lines transitively. Types-only, so no
  # runtime effect. `catalog:` keeps it in sync with the catalog entry above.
  "@types/node": "catalog:"

# Supply-chain maturity delay: don't adopt a freshly published version until it
# has been on the registry for 7 days (10080 minutes). Strict mode also validates
# the committed lockfile against this cutoff.
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
# First-party (btravstack) packages are exempt from the maturity gate so freshly
# published versions can be adopted immediately.
minimumReleaseAgeExclude:
  - "@btravstack/commitlint"
  - "@btravstack/oxlint"
  - "@btravstack/theme"
  - "@btravstack/tsconfig"
  - "@btravstack/typedoc"
  - unthrown
  - "@unthrown/vitest"
  # Temporary: fast-uri 3.1.4 (the GHSA-v2hh-gcrm-f6hx override above) is younger
  # than the 7-day cutoff. Remove once 3.1.4 is 7 days old (published 2026-07-19).
  - fast-uri

allowBuilds:
  cpu-features: true
  esbuild: true
  lefthook: true
  protobufjs: true
  ssh2: true
